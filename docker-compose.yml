version: '3.8'

services:
  web:
    build: ./backend
    ports:
      - "2898:8000"
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1
      - DB_NAME=warehouse_db
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_HOST=db
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: warehouse_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
